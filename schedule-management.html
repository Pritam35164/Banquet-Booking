<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Management - BanquetBook</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/schedule.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <span>BanquetBook</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item" onclick="event.preventDefault(); goToDashboard();">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admin-dashboard.html" class="nav-item" onclick="event.preventDefault(); goToDashboard('bookings');">
                    <i class="fas fa-calendar-check"></i>
                    <span>Bookings</span>
                </a>
                <a href="schedule-management.html" class="nav-item active">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Schedule</span>
                </a>
                <a href="admin-dashboard.html" class="nav-item" onclick="event.preventDefault(); goToDashboard('venue');">
                    <i class="fas fa-building"></i>
                    <span>Manage Venue</span>
                </a>
                <a href="admin-dashboard.html" class="nav-item" onclick="event.preventDefault(); goToDashboard('analytics');">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn btn-danger btn-block">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Header -->
            <header class="dashboard-header">
                <div>
                    <h1><i class="fas fa-calendar-alt"></i> Schedule Management</h1>
                    <p>View and manage your venue's booking calendar</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="previousMonth()">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="btn btn-primary" onclick="goToToday()">
                        <i class="fas fa-calendar-day"></i> Today
                    </button>
                    <button class="btn btn-outline" onclick="nextMonth()">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </header>

            <!-- Calendar Controls -->
            <div class="calendar-controls">
                <div class="month-selector">
                    <h2 id="currentMonthYear">October 2025</h2>
                </div>
                <div class="view-toggle">
                    <button class="toggle-btn active" onclick="switchView('month')" id="monthViewBtn">
                        <i class="fas fa-calendar"></i> Month
                    </button>
                    <button class="toggle-btn" onclick="switchView('list')" id="listViewBtn">
                        <i class="fas fa-list"></i> List
                    </button>
                </div>
            </div>

            <!-- Calendar View -->
            <div id="calendarView" class="calendar-container">
                <div class="calendar-header">
                    <div class="calendar-day-name">Sunday</div>
                    <div class="calendar-day-name">Monday</div>
                    <div class="calendar-day-name">Tuesday</div>
                    <div class="calendar-day-name">Wednesday</div>
                    <div class="calendar-day-name">Thursday</div>
                    <div class="calendar-day-name">Friday</div>
                    <div class="calendar-day-name">Saturday</div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Calendar days will be generated here -->
                </div>
            </div>

            <!-- List View -->
            <div id="listView" class="list-container" style="display: none;">
                <div class="list-filters">
                    <select id="statusFilter" onchange="filterBookingsList()">
                        <option value="all">All Bookings</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Pending">Pending</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                    <input type="text" id="searchBooking" placeholder="Search by client name..." onkeyup="filterBookingsList()">
                </div>
                <div class="bookings-list" id="bookingsList">
                    <!-- Bookings will be listed here -->
                </div>
            </div>

            <!-- Legend -->
            <div class="calendar-legend">
                <h3>Legend</h3>
                <div class="legend-items">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #10b981;"></span>
                        <span>Confirmed Booking</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #f59e0b;"></span>
                        <span>Pending Review</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #ef4444;"></span>
                        <span>Cancelled</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #6366f1;"></span>
                        <span>Multiple Bookings</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Booking Details Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeBookingModal()">&times;</span>
            <div id="modalBookingDetails">
                <!-- Booking details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Day Details Modal -->
    <div id="dayModal" class="modal">
        <div class="modal-content modal-large">
            <span class="modal-close" onclick="closeDayModal()">&times;</span>
            <div id="modalDayDetails">
                <!-- Day details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/schedule-management.js"></script>
</body>
</html>
